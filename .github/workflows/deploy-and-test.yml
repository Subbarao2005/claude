name: Deploy and Phase 4 Test Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install backend dependencies
        run: cd server && npm ci
      - name: Run backend Jest tests
        run: cd server && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci
          RAZORPAY_KEY_ID: test_key
          RAZORPAY_KEY_SECRET: test_secret

  test-frontend:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install frontend dependencies
        run: cd client && npm ci
      - name: Run frontend Vitest tests
        run: cd client && npm test

  deploy-backend:
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
      - name: Wait for backend deployment
        run: sleep 120
      - name: Verify backend health
        run: curl -f "${{ secrets.API_URL }}/health" || exit 1

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: |
          vercel --prod --yes \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --build-env VITE_API_URL="${{ secrets.API_URL }}/api"
        working-directory: client
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Verify frontend deployed
        run: curl -f "${{ secrets.APP_URL }}" || exit 1

  post-deploy-tests:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_URL }}
      E2E_BASE_URL: ${{ secrets.APP_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install Phase 4 test dependencies
        run: cd tests && npm ci
      - name: Install Playwright browsers
        run: cd tests && npx playwright install chromium
      - name: Run smoke tests
        run: cd tests && npm run test:smoke
      - name: Run deployment tests
        run: cd tests && npm run test:deploy
      - name: Run security tests
        run: cd tests && npm run test:security
      - name: Run E2E tests
        run: cd tests && npm run test:e2e
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
